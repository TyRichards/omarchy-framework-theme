# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgb(ac9cd6)

# Override Omarchy default opacity (0.97 0.9) for all windows
windowrule = opacity 1 1, match:class .*

general {
    layout = dwindle
    gaps_in = 8
    gaps_out = 16
    border_size = 2
    col.active_border = $activeBorderColor
    col.inactive_border = rgba(4e3f6eff)
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 1
    dim_special = 0.0
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 12
        render_power = 3
        color = rgba(22222280)
    }

    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        xray = false
		    contrast = 0.75
		    brightness = 0.8
		    noise = 0.05
		    vibrancy = 1.0
		    vibrancy_darkness = 0.1
		    special = true
    }
}
